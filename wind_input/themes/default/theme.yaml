meta:
  name: "默认主题"
  version: "2.5"
  author: "清风输入法"
  order: 0

# v2.5 schema: 引用共享 layout + palette 零件
layout: compact-horizontal
palette: windy-blue

# v2.6 盒模型 View 外观（P2 切片-0 几何 + 切片-1 颜色）：与 compact-horizontal/windy-blue
# 现状一致，仅显式字段覆盖渲染器合成桥基线。颜色用 ${语义} token 解析自 palette（零回归）；
# 字号不在此声明（沿用用户全局配置）。
views:
  window:
    padding: {top: 6, right: 8, bottom: 6, left: 8}
    border: {radius: 8, width: 1px, color: "${border}"}   # 1px 发丝线：边框不随 DPI 加粗（匹配旧渲染器）
    background: {color: "${background}"}
  preedit_bar:
    padding: {left: 8, right: 8}
    background: {color: "${preedit_bg}"}
    color: "${preedit_text}"
  item:
    padding: {left: 8, right: 10}
    border: {radius: 4}
    selected: {background: {color: "${selected_bg}"}}
    hover: {background: {color: "${hover_bg}"}}
  index:
    background: {color: "${index_bg}", shape: circle}
    color: "${index_text}"
    font_size: -4                                  # 序号小号(主候选-4)；数字嵌入圆内
    padding: {top: 2, bottom: 2, left: 2, right: 2}  # 圆圈直径 = 序号字号 + 上下 padding
  text:
    margin: {left: 4}
    color: "${text}"
  comment:
    margin: {left: 6}
    color: "${comment}"
    font_size: -4                                  # 注释小号(主候选-4)
  footer_bar:
    font_size: -4                                  # 页码/翻页字号(主候选-4)
  accent_bar:
    background: {color: "${accent}"}
  status:
    background: {color: "${background}"}
    color: "${text}"
  tooltip:
    background: {color: "${background}"}
    color: "${text}"
  toolbar:
    background: {color: "${background}"}
    border: {color: "${border}"}
    grip: {color: "${grip}"}
    button:
      background: {color: "${button_bg}"}
      color: "${button_text}"
      mode:
        chinese: {background: {color: "${mode_cn_bg}"}}
        english: {background: {color: "${mode_en_bg}"}}
    settings:
      icon: {color: "${settings_icon}"}
      hole: {color: "${settings_hole}"}
  menu:
    background: {color: "${background}"}
    border: {color: "${border}"}
    color: "${text}"
    separator: {color: "${separator}"}
    disabled: "${disabled}"
    hover:
      background: {color: "${hover_bg}"}
      color: "${hover_text}"
