# WindInput 系统短语
# 随程序打包发布，用户不应直接修改此文件
# 文本中的 $变量 会在运行时自动展开
# 支持 $var 和 ${var} 两种语法，$$ 转义为 $
#
# 权重字段 (可选):
#   weight: 0~10000, 优先级高于 position; 未设置时走 position fallback (10000 - position)
#   档位参考: 必置顶 8000~10000 / 高频 4000~7000 / 中位 1000 (默认) / 罕用 200~500 / 禁用 0
# 详见 docs/design/2026-05-12-command-bar-design.md §3.8

phrases:
  # ===== 日期 =====
  - code: "date"
    text: "$Y年$M月$D日"
    position: 1
  - code: "date"
    text: "$Y-$MM-$DD"
    position: 2
  - code: "date"
    text: "$Y.$MM.$DD"
    position: 3
  - code: "date"
    text: "$Y/$MM/$DD"
    position: 4
  - code: "date"
    text: "${YC}年${MC}月${DC}日"
    position: 5

  # ===== 时间 =====
  - code: "time"
    text: "$HH:$mm:$ss"
    position: 1
  - code: "time"
    text: "$HH:$mm"
    position: 2
  - code: "time"
    text: "$HH时$mm分$ss秒"
    position: 3

  # ===== 日期时间 =====
  - code: "datm"
    text: "$Y年$M月$D日 $HH:$mm:$ss"
    position: 1
  - code: "datm"
    text: "$Y-$MM-$DD $HH:$mm:$ss"
    position: 2
  - code: "datm"
    text: "${YC}年${MC}月${DC}日 $HH:$mm:$ss"
    position: 3

  # ===== 星期 =====
  - code: "week"
    text: "星期$WC"
    position: 1
  - code: "week"
    text: "周$WC"
    position: 2
  - code: "week"
    text: "$Y年$M月$D日 星期$WC"
    position: 3
  - code: "week"
    text: "$Y年$M月$D日 周$WC"
    position: 4

  # ===== UUID =====
  - code: "uuid"
    text: "$uuid"
    position: 1

  # ===== 时间戳 =====
  - code: "tmts"
    text: "$ts"
    position: 2
  - code: "tmts"
    text: "$tsms"
    position: 3

