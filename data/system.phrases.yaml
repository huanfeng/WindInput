  # ===== zz 系列：日期时间快捷输入 =====

  # zzrq - 日期（与 date 统一）
  - code: "zzrq"
    text: "$Y年$M月$D日"
    position: 1
  - code: "zzrq"
    text: "$Y-$MM-$DD"
    position: 2
  - code: "zzrq"
    text: "$Y.$MM.$DD"
