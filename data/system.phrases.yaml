  # ===== 命令直通车 (Command Bar) 测试用例 =====
  # 触发码统一用 co 前缀, 后续字母全部用字母 (不含数字), 因为五笔/拼音
  # 输入数字会立刻选词, 数字键到不了 phrase 查询。
  # 文档: docs/design/2026-05-12-command-bar-design.md

  # --- 打开 URL / 运行程序 / shell ---
  - code: "cobd"
    text: '$CC1("打开百度", open("https://baidu.com"))'
    position: 1
  - code: "cobs"
    text: '$CC1("百度搜 {tail(code,5)}", open("https://www.baidu.com/s?wd={url(tail(code,5))}"))'
    position: 1
  - code: "cozd"
    text: '$CC1("汉典 · {last(1)}", open("https://www.zdic.net/hans/{url(last(1))}"))'
    position: 1
  - code: "cono"
    text: '$CC("打开记事本", run("notepad.exe"))'
    position: 1
  - code: "cosh"
    text: '$CC("ping baidu", shell("ping -n 1 baidu.com"))'
    position: 1
  - code: "cobu"
    text: '$CC("baidu 搜 {tail(code,5)}", search("baidu", tail(code,5)))'
    position: 1

  # --- 文本上屏: type() 走 TSF, 含 last/calc/env 取值 ---
  - code: "coll"
    text: '$CC(last(), type(last()))'
    position: 1
  - code: "coca"
    text: '$CC("={calc(tail(code,5))}", type(calc(tail(code,5))))'
    position: 1
  - code: "conw"
    text: '$CC("现在 {now()}", type(now()))'
    position: 1
  - code: "coev"
    text: '$CC("USER={upper(env("USERNAME"))}", type(upper(env("USERNAME"))))'
    position: 1
  - code: "coap"
    text: '$CC("当前: {app()}", type(app()))'
    position: 1
  - code: "coti"
    text: '$CC("标题: {title()}", type(title()))'
    position: 1

  # --- type + key.tap/seq 组合: 配对符号 + 删行 ---
  - code: "cojk"
    text: '$CC("「」", type("「」"), key.tap("Left"))'
    position: 1
  - code: "cojb"
    text: '$CC("()", type("()"), key.tap("Left"))'
    position: 1
  - code: "codl"
    text: '$CC("[删行]", key.seq("Home", "Shift+End", "Backspace"))'
    position: 1

  # --- 剪贴板 / 加词 ---
  - code: "cocp"
    text: '$CC("复制时间", clip.copy(now()))'
    position: 1
  - code: "coaw"
    text: '$CC("加词 · {clip()}", dict.addword(clip()))'
    position: 1

  # --- IME 自身切换 ---
  - code: "coen"
    text: '$CC("切中英", ime.toggle("cn-en"))'
    position: 1
  - code: "cofs"
    text: '$CC("切全半角", ime.toggle("fullshape"))'
    position: 1
  - code: "coly"
    text: '$CC("切横纵候选", ime.toggle("layout"))'
    position: 1
  - code: "cocw"
    text: '$CC("切候选窗", ime.toggle("candwin"))'
    position: 1
  - code: "coss"
    text: '$CC("打开设置", ime.setting(""))'
    position: 1
