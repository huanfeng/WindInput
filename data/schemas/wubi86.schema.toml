[schema]
id = "wubi86"
name = "五笔"
icon_label = "五"
version = "1.0"
author = "内置"
description = "五笔86版输入方案（基于rime-wubi86-jidian增加词频生成）"

[engine]
type = "codetable"
filter_mode = "smart"

[engine.chaizi]
db_path = "wubi86/wubi86_chaizi.txt"
font_family = "wubi86/HeiTiZiGen.ttf"
font_dw_name = "黑体字根"

[engine.codetable]
max_code_length = 4
auto_commit_unique = false
clear_on_empty_max = false
top_code_commit = true
punct_commit = true
show_code_hint = true
single_code_input = false
single_code_complete = true
candidate_sort_mode = "frequency"
z_key_repeat = true

[engine.codetable.temp_pinyin]
enabled = true
schema = "pinyin"

[[dictionaries]]
id = "wubi86_main"
label = "极点五笔主词库"
description = "极点五笔基础词库，含单字与高频词组"
path = "wubi86/wubi86_jidian.dict.yaml"
type = "rime_codetable"
default = true

[[dictionaries]]
id = "wubi86_extra"
label = "扩展词库"
description = "新词、网络用语、生僻词等非常用词条"
path = "wubi86/wubi86_jidian_extra.dict.yaml"
type = "rime_codetable"
default_enabled = true
weight_as_order = true

[[dictionaries]]
id = "wubi86_emoji"
label = "Emoji 表情"
description = "按五笔编码检索 emoji；输入 emoj 可查看常用表情"
path = "wubi86/wubi86_jidian_emoji.dict.yaml"
type = "rime_codetable"
default_enabled = true
weight_as_order = true

[[dictionaries]]
id = "wubi86_xzqy"
label = "行政区域"
description = "省市县区等地名词条"
path = "wubi86/wubi86_jidian_extra_district.dict.yaml"
type = "rime_codetable"
default_enabled = false
weight_as_order = true

[learning]

[learning.auto_learn]
enabled = false

[learning.freq]
enabled = false
protect_top_n = 1

[encoder]
max_word_length = 10

[[encoder.rules]]
length_equal = 2
formula = "AaAbBaBb"

[[encoder.rules]]
length_equal = 3
formula = "AaBaCaCb"

[[encoder.rules]]
length_in_range = [4, 10]
formula = "AaBaCaZa"
