schema:
  id: wubi86_pinyin
  name: "五笔拼音"
  icon_label: "中"
  version: "1.0"
  author: "内置"
  description: "五笔86+拼音混合输入方案，五笔优先，拼音补充"

engine:
  type: mixed
  codetable:
    max_code_length: 4
    auto_commit_unique: false
    clear_on_empty_max: false
    top_code_commit: true
    punct_commit: true
    show_code_hint: true
    single_code_input: false
    candidate_sort_mode: frequency
  pinyin:
    scheme: full
    show_wubi_hint: true
    use_smart_compose: true
    candidate_order: smart
  mixed:
    min_pinyin_length: 2
    wubi_weight_boost: 10000000
    show_source_hint: true
  filter_mode: smart

dictionaries:
  - id: wubi86_main
    path: "dict/wubi86/wubi86_jidian.dict.yaml"
    type: rime_wubi
    default: true
    weight_spec:
      median: 10
      max: 890
      min: 5
      mode: linear
  - id: pinyin_main
    path: "dict/pinyin/rime_ice.dict.yaml"
    type: rime_pinyin
    weight_spec:
      median: 200
      max: 19260817
      mode: log
  - id: wubi_reverse
    path: "dict/wubi86/wubi86_jidian.dict.yaml"
    type: rime_wubi
    role: reverse_lookup

user_data:
  shadow_file: "wubi86_pinyin.shadow.yaml"
  user_dict_file: "wubi86_pinyin.userwords.txt"
  user_freq_file: "wubi86_pinyin.userfreq.txt"
  temp_dict_file: "wubi86_pinyin.tempdict.txt"

encoder:
  max_word_length: 10
  rules:
    - length_equal: 2
      formula: "AaAbBaBb"
    - length_equal: 3
      formula: "AaBaCaCb"
    - length_in_range: [4, 10]
      formula: "AaBaCaZa"

learning:
  mode: frequency
  unigram_path: "dict/pinyin/unigram.txt"
  protect_top_n: 3
  temp_max_entries: 5000
  temp_promote_count: 3
